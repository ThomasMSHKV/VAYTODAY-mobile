name: VayToday
description: "Каталог компаний с чатом"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  go_router: ^14.3.0

  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0

  shared_preferences: ^2.3.2

  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  cloud_firestore: ^5.5.0
  firebase_auth: ^5.3.3

  flutter_svg: ^2.0.16
  shimmer: ^3.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  retrofit_generator: ^9.1.2
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "assets/icons/app_icon_background.png"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  remove_alpha_ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/icons/logo.svg
    - assets/icons/white_logo.svg
    - assets/icons/app_icon.png
    - assets/icons/app_icon_background.png
    - assets/icons/app_icon_foreground.png

